name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build project
        run: cargo build --release

      - name: Package release assets
        run: |
          mkdir staging
          Copy-Item target\release\clipboard-replacer.exe -Destination staging\
          Copy-Item install.ps1 -Destination staging\
          Copy-Item uninstall.ps1 -Destination staging\
          Compress-Archive -Path staging\* -DestinationPath clipboard-replacer-x86_64-pc-windows-msvc.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          files: clipboard-replacer-x86_64-pc-windows-msvc.zip
          token: ${{ secrets.GITHUB_TOKEN }}

